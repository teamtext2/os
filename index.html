<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Text2 OS - Mobile Ecosystem</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Nạp Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Nạp Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Nạp SortableJS cho tính năng kéo thả -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- CSS Tách Biệt Theo Từng Cụm -->
    <link rel="stylesheet" href="data/css/base.css">
    <link rel="stylesheet" href="data/css/window.css">
    <link rel="stylesheet" href="data/css/dock.css">
    <link rel="stylesheet" href="data/css/apps.css">
    <link rel="stylesheet" href="data/css/gestures.css">
</head>
<body class="bg-black">

    <!-- Màn hình chờ tương tác để bật Fullscreen -->
    <div id="start-overlay" class="fixed inset-0 z-[100] bg-black text-white flex flex-col items-center justify-center cursor-pointer transition-opacity duration-500" onclick="startOS()">
        <i data-lucide="power" class="w-16 h-16 text-blue-500 animate-pulse mb-6"></i>
        <h2 class="text-2xl font-bold mb-2">Text2 OS</h2>
        <p class="text-gray-400 text-sm">Chạm để khởi động</p>
    </div>

    <!-- Khung Hệ Điều Hành (Tràn viền 100%) -->
    <div id="os-container" class="relative flex flex-col w-full h-[100dvh] bg-cover bg-center text-white overflow-hidden transition-all duration-500" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');">
        
        <!-- Màn hình khởi động -->
        <div id="boot-screen" class="absolute inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-500">
            <i data-lucide="cpu" class="w-16 h-16 text-white animate-pulse mb-4"></i>
            <h1 class="text-2xl font-bold tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">TEXT2 OS</h1>
            <p class="text-xs text-gray-500 mt-2">Đang nạp hệ sinh thái...</p>
        </div>

        <!-- Thanh Trạng Thái (Status Bar) -->
        <div class="w-full flex justify-between items-center px-6 pt-4 pb-2 text-sm font-medium z-10 drop-shadow-md">
            <span id="clock" class="tracking-wider text-shadow">00:00</span>
            <div class="flex items-center gap-1.5 drop-shadow-md">
                <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
                <i data-lucide="wifi" class="w-4 h-4"></i>
                <i data-lucide="battery-full" class="w-5 h-5"></i>
            </div>
        </div>

        <!-- Lưới Ứng dụng (App Grid) -->
        <div class="flex-1 px-4 pt-6 overflow-y-auto z-10 pb-24" id="main-screen">
            <div id="app-grid" class="grid grid-cols-4 gap-x-4 gap-y-6">
                <!-- App icons sẽ được render ở đây -->
            </div>
        </div>

        <!-- Dock dưới cùng (Hỗ trợ kéo thả ứng dụng) -->
        <div id="dock-grid" class="absolute bottom-6 left-4 right-4 glass-dock rounded-3xl p-3 flex justify-center items-center gap-4 z-10 drop-shadow-2xl min-h-[72px]">
            <div class="app-icon flex flex-col items-center cursor-pointer" onclick="openApp('Camera', 'https://text2.co/app/camera/')">
                <div class="w-12 h-12 bg-gray-800 rounded-2xl flex items-center justify-center shadow-lg border border-gray-600">
                    <i data-lucide="camera" class="w-6 h-6 text-white"></i>
                </div>
                <span class="app-label text-xs text-white text-center w-full truncate drop-shadow-md font-medium px-1 mt-1.5">Camera</span>
            </div>
            <div class="app-icon flex flex-col items-center cursor-pointer" onclick="openApp('Trình duyệt', 'https://bing.com')">
                <div class="w-12 h-12 bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg border border-blue-400">
                    <i data-lucide="compass" class="w-6 h-6 text-white"></i>
                </div>
                <span class="app-label text-xs text-white text-center w-full truncate drop-shadow-md font-medium px-1 mt-1.5">Trình duyệt</span>
            </div>
            <div class="app-icon flex flex-col items-center cursor-pointer" onclick="openTaskSwitcher()">
                <div class="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center shadow-lg border border-indigo-400 relative">
                    <i data-lucide="layers" class="w-6 h-6 text-white"></i>
                    <span id="task-badge" class="absolute -top-1 -right-1 bg-red-500 text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
                </div>
                <span class="app-label text-xs text-white text-center w-full truncate drop-shadow-md font-medium px-1 mt-1.5">Đa nhiệm</span>
            </div>
            <div class="app-icon flex flex-col items-center cursor-pointer" onclick="openSettings()">
                <div class="w-12 h-12 bg-gray-300 rounded-2xl flex items-center justify-center shadow-lg border border-gray-100">
                    <i data-lucide="settings" class="w-6 h-6 text-gray-800"></i>
                </div>
                <span class="app-label text-xs text-white text-center w-full truncate drop-shadow-md font-medium px-1 mt-1.5">Cài đặt</span>
            </div>
        </div>

        <!-- ================= CÁC LAYER ỨNG DỤNG ================= -->

        <!-- 1. Layer chứa các Iframe (App đang chạy) -->
        <div id="app-layer" class="layer-window absolute inset-0 bg-white flex flex-col overflow-hidden">
            <div id="app-loading" class="absolute inset-0 flex items-center justify-center bg-white z-50 pointer-events-none hidden">
                <div class="flex flex-col items-center gap-2">
                    <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 animate-spin"></i>
                    <span class="text-gray-500 text-sm">Đang tải...</span>
                </div>
            </div>

            <!-- Container chứa các iframes -->
            <div id="iframes-container" class="flex-1 relative bg-white"></div>
            
            <!-- Đệm khoảng trống ở đáy màn hình thay thế thanh cử chỉ -->
            <div class="h-6 w-full bg-white shrink-0"></div>
        </div>

        <!-- 2. Layer Đa Nhiệm (Nền mờ Đa nhiệm) -->
        <div id="task-switcher-layer" class="layer-window absolute inset-0 bg-black/35 backdrop-blur-2xl pointer-events-none"></div>

        <!-- 3. Layer Cài Đặt Hệ Thống (Native UI) -->
        <div id="settings-layer" class="layer-window absolute inset-0 bg-gray-50 text-black flex flex-col overflow-hidden">
            <div class="w-full h-14 bg-white flex items-center px-4 border-b shrink-0 shadow-sm">
                <button onclick="closeSettings()" class="text-blue-500 flex items-center gap-1 font-medium">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> Xong
                </button>
                <h2 class="flex-1 text-center font-bold text-lg mr-8">Cài đặt</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-50">
                <div class="bg-white rounded-2xl shadow-sm p-4 mb-6">
                    <div class="flex items-center gap-4 mb-2">
                        <div class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full flex items-center justify-center text-white text-xl font-bold">T2</div>
                        <div>
                            <h3 class="font-bold text-lg">Tài khoản Text2</h3>
                            <p class="text-sm text-gray-500">Đã kết nối hệ sinh thái</p>
                        </div>
                    </div>
                </div>

                <h3 class="font-bold text-gray-700 ml-2 mb-2 uppercase text-xs tracking-wider">Hình nền (Wallpaper)</h3>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div onclick="changeWallpaper('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop')" class="h-40 rounded-xl bg-cover bg-center cursor-pointer border-2 border-transparent focus:border-blue-500 active:opacity-70" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=500');"></div>
                    <div onclick="changeWallpaper('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2564&auto=format&fit=crop')" class="h-40 rounded-xl bg-cover bg-center cursor-pointer border-2 border-transparent active:opacity-70" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=500');"></div>
                    <div onclick="changeWallpaper('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2564&auto=format&fit=crop')" class="h-40 rounded-xl bg-cover bg-center cursor-pointer border-2 border-transparent active:opacity-70" style="background-image: url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=500');"></div>
                    <div onclick="changeWallpaper('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2564&auto=format&fit=crop')" class="h-40 rounded-xl bg-cover bg-center cursor-pointer border-2 border-transparent active:opacity-70" style="background-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=500');"></div>
                </div>

                <h3 class="font-bold text-gray-700 ml-2 mb-2 uppercase text-xs tracking-wider">Thông tin hệ thống</h3>
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                    <div class="px-4 py-3 border-b flex justify-between text-sm">
                        <span class="text-gray-700">Phiên bản OS</span>
                        <span class="text-gray-400">2.0 (Full-screen)</span>
                    </div>
                    <div class="px-4 py-3 flex justify-between text-sm">
                        <span class="text-gray-700">Tổng ứng dụng</span>
                        <span id="total-apps-count" class="text-gray-400">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thông báo Toast -->
        <div id="toast" class="absolute top-16 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur text-black px-4 py-2 rounded-full text-xs font-semibold shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50">
            Thông báo
        </div>

        <!-- Global Home Indicator (Thanh kéo cử chỉ hệ thống) -->
        <div id="home-indicator" class="home-indicator-wrapper absolute bottom-0 left-0 right-0 z-50 pb-2">
            <div class="home-indicator-bar"></div>
        </div>
    </div>

    <!-- JS Tách Biệt Theo Từng Cụm chức năng -->
    <script src="data/js/config.js"></script>
    <script src="data/js/apps.js"></script>
    <script src="data/js/multitasking.js"></script>
    <script src="data/js/settings.js"></script>
    <script src="data/js/system.js"></script>
    <script src="data/js/gestures.js"></script>
</body>
</html>
